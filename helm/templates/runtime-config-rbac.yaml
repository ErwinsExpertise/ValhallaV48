---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: valhalla-runtime-config
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: valhalla-runtime-config
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: valhalla-runtime-config
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: valhalla-runtime-config
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: valhalla-runtime-config
