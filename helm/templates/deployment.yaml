---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-server
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: login-server
  template:
    metadata:
      labels:
        app: login-server
    spec:
      containers:
        - name: valhalla
          image: {{ .Values.image }}
          command: ["/bin/sh", "-c"]
          args: ["/app/Valhalla -type login -config /app/docker/docker_config_login.toml"]
          ports:
            - containerPort: 8484
          volumeMounts:
            - name: cfg
              mountPath: /app/docker/docker_config_login.toml
              subPath: docker_config_login.toml
            {{- if .Values.nx.existingClaim }}
            - name: nx-data
              mountPath: {{ .Values.nx.path | quote }}
              readOnly: {{ .Values.nx.readOnly }}
            {{- end }}
            {{- if .Values.mysql.tls.existingSecret }}
            - name: mysql-tls
              mountPath: /etc/valhalla/mysql-tls
              readOnly: true
            {{- end }}
      volumes:
        - name: cfg
          configMap:
            name: login-config
            items:
              - key: config_login.toml
                path: docker_config_login.toml
        {{- if .Values.nx.existingClaim }}
        - name: nx-data
          persistentVolumeClaim:
            claimName: {{ .Values.nx.existingClaim }}
        {{- end }}
        {{- if .Values.mysql.tls.existingSecret }}
        - name: mysql-tls
          secret:
            secretName: {{ .Values.mysql.tls.existingSecret }}
        {{- end }}

