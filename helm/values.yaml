clusterDomain: cluster.local
image: docker/valhalla:latest
namespace: valhalla
gateway:
  enabled: true
  createGateway: true
  name: valhalla-gateway
  namespace: ""
  gatewayClassName: valhalla-traefik
  publicAddress: ""
  autoDiscoverAddress: true
  discovery:
    serviceName: ""
    namespace: ""
  annotations: {}
  labels: {}
  listeners:
    login: true
    cashshop: true
    channels: true
controller:
  enabled: true
  image: traefik:v3.6.10
  imagePullPolicy: IfNotPresent
  replicas: 1
  service:
    type: LoadBalancer
    annotations: {}
    loadBalancerClass: ""
    externalTrafficPolicy: ""
runtimeConfig:
  image: alpine/k8s:1.31.12
  imagePullPolicy: IfNotPresent
nx:
  path: ""
  existingClaim: ""
  readOnly: true
channel:
  jitter: 0
  latency: 0
  maxPop: 250
  packetQueueSize: 512
  replicas: 1
  clientConnectionAddress: ""
cashshop:
  jitter: 0
  latency: 0
  packetQueueSize: 512
  clientConnectionAddress: ""
login:
  jitter: 0
  latency: 0
  maxPop: 250
  packetQueueSize: 512
  withPin: true
  autoRegister: false
mysql:
  database: maplestory
  host: mysql.mysql.svc.cluster.local
  password: maplestory
  port: 3306
  user: root
  tls:
    mode: ""
    serverName: ""
    caFile: ""
    certFile: ""
    keyFile: ""
    existingSecret: ""
world:
  autoBan: false
  dropRate: 1.1
  expRate: 1.1
  jitter: 0
  latency: 0
  maxPop: 250
  mesosRate: 1.1
  message: message
  packetQueueSize: 512
  ribbon: 2
