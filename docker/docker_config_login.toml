[database]
address = "db"
port = "3306"
user = "root"
password = "password"
database = "maplestory"

# Optional MySQL TLS settings:
# [database.tls]
# mode = "preferred"
# serverName = "db.example.com"
# caFile = "/etc/valhalla/mysql-tls/ca.pem"
# certFile = "/etc/valhalla/mysql-tls/client-cert.pem"
# keyFile = "/etc/valhalla/mysql-tls/client-key.pem"

[login]
clientListenAddress = "0.0.0.0"
clientListenPort = "8484"
serverListenAddress = "0.0.0.0"
serverListenPort = "8485"
withPin = true
autoRegister = false
packetQueueSize = 512
