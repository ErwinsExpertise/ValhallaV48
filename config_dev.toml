# Dev Mode Configuration
# This configuration file contains settings for all server types
# allowing you to run login, world, channel, and cashshop servers in a single process

[database]
address = "127.0.0.1"
port = "3306"
user = "root"
password = "maplestory"
database = "maplestory"

# Optional MySQL TLS settings.
# mode = "disabled"     # local non-TLS MySQL (default if omitted)
# mode = "preferred"    # try TLS first, allow fallback
# mode = "skip-verify"  # dev/test only
# mode = "required"     # require TLS and verify using system roots
# caFile = "/path/to/ca.pem"
# certFile = "/path/to/client-cert.pem"
# keyFile = "/path/to/client-key.pem"
# serverName = "db.example.com"
#
# Example cloud config:
# [database.tls]
# mode = "required"
# caFile = "/etc/ssl/certs/mysql-ca.pem"
# serverName = "mydb.example.com"

[nx]
# Optional: path to Data.nx or a folder containing Base.nx, Character.nx, etc.
path = ""

[login]
clientListenAddress = "0.0.0.0"
clientListenPort = "8484"
serverListenAddress = "127.0.0.1"
serverListenPort = "8485"
withPin = false
autoRegister = true
packetQueueSize = 512
latency = 0
jitter = 0

[world]
message = "Welcome to Dev Mode"
ribbon = 2
expRate = 2.0
dropRate = 2.0
mesosRate = 2.0
autoBan = false
loginAddress = "127.0.0.1"
loginPort = "8485"
listenAddress = "127.0.0.1"
listenPort = "8584"
packetQueueSize = 512

[channel]
worldAddress = "127.0.0.1"
worldPort = "8584"
listenAddress = "0.0.0.0"
listenPort = "8685"
clientConnectionAddress = "127.0.0.1"
packetQueueSize = 512
maxPop = 250
latency = 0
jitter = 0

[cashshop]
worldAddress = "127.0.0.1"
worldPort = "8584"
listenAddress = "0.0.0.0"
listenPort = "8600"
clientConnectionAddress = "127.0.0.1"
packetQueueSize = 512
latency = 0
jitter = 0
